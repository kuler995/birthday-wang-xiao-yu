<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我们的专属祝福</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fff5f8, #e8f4ff);
            font-family: "Microsoft Yahei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
        }
        .photo-container {
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }
        .photo-box {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(100,150,200,0.25);
            animation: float 4s infinite ease-in-out alternate;
        }
        .photo-box img {
            width: 100%;
            display: block;
            object-fit: cover;
        }
        @keyframes float {
            from {transform: translateY(0);}
            to {transform: translateY(-8px);}
        }
        .title {
            font-size: 26px;
            color: #2d3748;
            margin-bottom: 20px;
            text-align: center;
        }
        .words {
            font-size: 17px;
            color: #4a5568;
            line-height: 1.9;
            text-align: center;
        }
    </style>
</head>
<body>
    <h2 class="title">致我们的时光✨</h2>
    <div class="photo-container">
        <div class="photo-box">
            <!-- 第一张合照 -->
            <img src="https://s3.bmp.ovh/2026/06/14/0NKmZ5h3.jpg" alt="合照1">
        </div>
        <div class="photo-box">
            <!-- 第二张合照 -->
            <img src="https://s3.bmp.ovh/2026/06/14/O6hVMQCH.jpg" alt="合照2">
        </div>
    </div>
    <p class="words">
        很开心能和你一起走过这段时光<br>
        西装革履的我们，是青春里最闪亮的模样<br>
        愿我们永远热烈，永远自在，未来继续并肩同行
    </p>
</body>
</html>
