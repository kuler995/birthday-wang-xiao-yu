<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>跳转中</title>
    <script>
        const targetUrl = encodeURIComponent("待替换链接");
        const wechatJump = `weixin://dl/business/?t=${targetUrl}`;

        window.onload = function(){
            window.location.href = wechatJump;
            setTimeout(function(){
                alert("未能自动打开微信，请复制链接手动在微信打开：\n" + decodeURIComponent(targetUrl));
            }, 1500);
        }
    </script>
    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-size:18px;
            color:#333;
        }
    </style>
</head>
<body>
    正在自动跳转微信...
</body>
</html>
