<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>致我们的时光✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: "Microsoft Yahei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            overflow-x: hidden;
            color: #fff;
        }
        /* 飘落爱心特效 */
        .heart {
            position: fixed;
            top: -10px;
            color: #ff6b81;
            font-size: 20px;
            pointer-events: none;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
        /* 照片容器 */
        .photo-container {
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
            z-index: 10;
        }
        .photo-box {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255,107,129,0.3);
            animation: glow 3s infinite ease-in-out alternate;
        }
        .photo-box img {
            width: 100%;
            display: block;
            object-fit: cover;
        }
        @keyframes glow {
            from {
                box-shadow: 0 0 20px rgba(255,107,129,0.2);
            }
            to {
                box-shadow: 0 0 40px rgba(255,107,129,0.5);
            }
        }
        .title {
            font-size: 28px;
            color: #ff6b81;
            margin-bottom: 20px;
            text-align: center;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255,107,129,0.5);
        }
        .words {
            font-size: 17px;
            color: #e0e0e0;
            line-height: 2;
            text-align: center;
            z-index: 10;
        }
        /* 烟花特效 */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <!-- 烟花画布 -->
    <canvas id="fireworks"></canvas>
    <!-- 飘落爱心容器 -->
    <div id="hearts"></div>

    <h2 class="title">致我们的时光✨</h2>
    <div class="photo-container">
        <div class="photo-box">
            <img src="https://s3.bmp.ovh/2026/06/14/0NKmZ5h3.jpg" alt="合照1">
        </div>
        <div class="photo-box">
            <img src="https://s3.bmp.ovh/2026/06/14/O6hVMQCH.jpg" alt="合照2">
        </div>
    </div>
    <p class="words">
        很开心能和你们一起走过这段时光<br>
        西装革履的我们，是青春里最闪亮的模样<br>
        愿我们永远热烈，永远自在，未来继续并肩同行<br>
        愿你平安喜乐，万事顺意，岁岁无忧
    </p>

    <script>
        // 飘落爱心生成
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.getElementById('hearts').appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 300);

        // 烟花特效
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Firework {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.speed = Math.random() * 3 + 2;
                this.targetY = Math.random() * canvas.height / 2;
                this.exploded = false;
                this.particles = [];
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
            }
            update() {
                if (!this.exploded) {
                    this.y -= this.speed;
                    if (this.y <= this.targetY) {
                        this.exploded = true;
                        for (let i = 0; i < 100; i++) {
                            this.particles.push({
                                x: this.x,
                                y: this.y,
                                vx: (Math.random() - 0.5) * 10,
                                vy: (Math.random() - 0.5) * 10,
                                life: 100
                            });
                        }
                    }
                } else {
                    this.particles.forEach(p => {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.vy += 0.1;
                        p.life--;
                    });
                    this.particles = this.particles.filter(p => p.life > 0);
                }
            }
            draw() {
                if (!this.exploded) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else {
                    this.particles.forEach(p => {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                        ctx.fillStyle = this.color;
                        ctx.globalAlpha = p.life / 100;
                        ctx.fill();
                        ctx.globalAlpha = 1;
                    });
                }
            }
        }

        let fireworks = [];
        function animate() {
            ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (Math.random() < 0.05) {
                fireworks.push(new Firework());
            }
            fireworks.forEach(f => {
                f.update();
                f.draw();
            });
            fireworks = fireworks.filter(f => !f.exploded || f.particles.length > 0);
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
